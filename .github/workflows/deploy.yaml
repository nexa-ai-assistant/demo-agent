name: Deploy to AWS EKS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

permissions:
  id-token: write   # required for OIDC assume-role
  contents: read

jobs:

  deploy:
    runs-on: ubuntu-latest

    steps:

    # Step 1: Checkout code
    - name: Checkout
      uses: actions/checkout@v4

    # Step 2: Assume IAM role via OIDC (GitHubActionDeployRole)
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}


    # Step 3: Login to ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2


    # Step 4: Build Docker image
    - name: Build image
      run: |
        docker build -t $ECR_REPOSITORY:${{ github.sha }} .


    # Step 5: Tag image
    - name: Tag image
      run: |
        docker tag $ECR_REPOSITORY:${{ github.sha }} \
        ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}


    # Step 6: Push image to ECR
    - name: Push image
      run: |
        docker push \
        ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}


    # Step 7: Install kubectl
    - name: Install kubectl
      run: |
        curl -sSLO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl && sudo mv kubectl /usr/local/bin/

    # Step 8: Update kubeconfig
    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --name $EKS_CLUSTER_NAME \
          --region $AWS_REGION


    # Step 10: Deploy to EKS
    # Server-side apply avoids "Invalid value" from oversized last-applied-configuration annotation
    - name: Deploy to EKS
      run: |
        IMAGE="${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}"
        sed -i "s|IMAGE_PLACEHOLDER|$IMAGE|g" k8s/deployment.yaml
        kubectl apply -f k8s/ --server-side --force-conflicts

    # Step 11: Verify deployment
    - name: Verify deployment
      run: |
        kubectl rollout status deployment/demo-agent --timeout=3m